# =============================================================================
# monitoring/prometheus-values.yaml — kube-prometheus-stack Helm values
#
# Install command:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --create-namespace \
#     -f kubernetes/monitoring/prometheus-values.yaml \
#     --wait --timeout=10m
#
# Includes: Prometheus + Alertmanager + Grafana + node-exporter + kube-state-metrics
# DCGM Exporter is discovered via ServiceMonitor from GPU Operator.
# =============================================================================

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Scrape all ServiceMonitors in any namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Retention
    retention: 7d
    retentionSize: "10GB"
    # Resources for inference monitoring workload
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "2Gi"
        cpu: "1"
    # Additional scrape configs for vLLM (no ServiceMonitor — annotation-based)
    additionalScrapeConfigs:
      - job_name: "vllm"
        scrape_interval: 15s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - inference
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

# ── Grafana — configured in grafana-values.yaml, disabled here ───────────────
# Grafana is managed separately to have cleaner config
grafana:
  enabled: false

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Prometheus Service (LoadBalancer, IP-restricted) ─────────────────────────
prometheus:
  service:
    type: LoadBalancer
    port: 9090
    # SECURITY: Replace placeholder via deploy-all.sh script
    loadBalancerSourceRanges:
      - "ALLOWED_ADMIN_CIDR_PLACEHOLDER"
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 7d
    retentionSize: "10GB"
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "2Gi"
        cpu: "1"
    additionalScrapeConfigs:
      - job_name: "vllm"
        scrape_interval: 15s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - inference
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
